<!-- 絃 GEN — Karplus-Strong physical modeling string instrument -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>絃 GEN — 物理モデル弦楽器</title>
<style>
  :root{
    --bg:#14100c;          /* warm charcoal, not pure black */
    --bg2:#1d160f;
    --ink:#f2e8d6;
    --dim:#9a8f7d;
    --line:#3a3226;
    --brass1:#ffcf6e;      /* string highlight */
    --brass2:#d98a3d;      /* string body */
    --ember:#ff7a3c;       /* pluck bloom */
    --teal:#4fd6c4;        /* UI accent, deliberate cool counterpoint */
    --panel:rgba(28,22,15,.72);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overflow:hidden;overscroll-behavior:none}
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}

  /* header */
  header{position:fixed;top:0;left:0;right:0;padding:18px 22px;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;z-index:5}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;
    font-size:30px;letter-spacing:.14em;margin:0;line-height:1;
    text-shadow:0 0 24px rgba(255,150,70,.25)}
  .brand .rom{font:400 11px/1 ui-monospace,"SF Mono",Menlo,monospace;
    letter-spacing:.42em;color:var(--brass1);text-transform:uppercase}
  .tag{max-width:360px;text-align:right;font:400 11px/1.55 ui-monospace,Menlo,monospace;
    color:var(--dim);letter-spacing:.02em}
  .tag b{color:var(--teal);font-weight:400}

  /* console */
  #console{position:fixed;left:0;right:0;bottom:0;z-index:6;
    background:linear-gradient(180deg,transparent,var(--bg) 44%);
    padding:26px 18px max(16px,env(safe-area-inset-bottom)) 18px}
  .rack{max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;gap:14px 26px;
    align-items:flex-end;justify-content:center;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px 20px;backdrop-filter:blur(10px)}
  .knob{display:flex;flex-direction:column;gap:7px;min-width:118px}
  .knob label{font:400 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.22em;
    text-transform:uppercase;color:var(--dim);display:flex;justify-content:space-between}
  .knob label b{color:var(--brass1);font-weight:400}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;
    background:var(--line);border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;
    border-radius:50%;background:var(--brass1);border:2px solid var(--bg);
    box-shadow:0 0 0 1px var(--brass2),0 0 12px rgba(255,150,70,.55);cursor:grab}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:2px solid var(--bg);
    border-radius:50%;background:var(--brass1);box-shadow:0 0 10px rgba(255,150,70,.5);cursor:grab}
  input[type=range]:focus-visible::-webkit-slider-thumb{outline:2px solid var(--teal);outline-offset:2px}

  .group{display:flex;flex-direction:column;gap:7px}
  .group .label{font:400 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.22em;
    text-transform:uppercase;color:var(--dim)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font:400 12px/1 "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--dim);background:transparent;border:1px solid var(--line);
    padding:7px 11px;border-radius:20px;cursor:pointer;transition:.16s;letter-spacing:.04em}
  .chip:hover{color:var(--ink);border-color:var(--brass2)}
  .chip[aria-pressed=true]{color:var(--bg);background:var(--brass1);border-color:var(--brass1);
    box-shadow:0 0 14px rgba(255,150,70,.4)}
  .chip.play[aria-pressed=true]{background:var(--teal);border-color:var(--teal);
    box-shadow:0 0 14px rgba(79,214,196,.45)}

  .hint{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:7;background:rgba(10,8,5,.55);backdrop-filter:blur(3px);cursor:pointer;transition:.4s}
  .hint.gone{opacity:0;pointer-events:none}
  .hint .card{text-align:center;padding:8px 20px}
  .hint .k{font:400 13px/1 ui-monospace,Menlo,monospace;letter-spacing:.4em;color:var(--brass1)}
  .hint .big{font-family:Georgia,serif;font-size:22px;letter-spacing:.06em;margin:14px 0 6px}
  .hint .sub{font:400 12px/1.6 sans-serif;color:var(--dim)}
  @media (max-width:640px){
    .brand h1{font-size:24px}.tag{display:none}
    .knob{min-width:44%;flex:1}
  }
  @media (prefers-reduced-motion:reduce){.hint{transition:none}}
</style>

<div id="stage"><canvas id="c"></canvas></div>

<header>
  <div class="brand">
    <h1>絃</h1><span class="rom">gen · string</span>
  </div>
  <div class="tag">物理モデル音源 <b>Karplus–Strong</b><br>撥弦を遅延線とフィルタで模した digital waveguide。<br>ノイズの励起が弦の減衰へと自ら育つ。</div>
</header>

<div id="console">
  <div class="rack">
    <div class="knob"><label>減衰 <b id="vDecay">—</b></label>
      <input id="decay" type="range" min="0" max="1" step="0.001" value="0.62"></div>
    <div class="knob"><label>音色 <b id="vTone">—</b></label>
      <input id="tone" type="range" min="0" max="1" step="0.001" value="0.5"></div>
    <div class="knob"><label>弾く位置 <b id="vPos">—</b></label>
      <input id="pos" type="range" min="0.04" max="0.5" step="0.001" value="0.22"></div>
    <div class="knob"><label>残響 <b id="vRev">—</b></label>
      <input id="rev" type="range" min="0" max="1" step="0.001" value="0.34"></div>
    <div class="knob"><label>胴鳴り <b id="vBody">—</b></label>
      <input id="body" type="range" min="0" max="1" step="0.001" value="0.5"></div>
    <div class="knob"><label>胴の大きさ <b id="vSize">—</b></label>
      <input id="size" type="range" min="0" max="1" step="0.001" value="0.5"></div>
    <div class="knob"><label>共鳴 <b id="vSymp">—</b></label>
      <input id="symp" type="range" min="0" max="1" step="0.001" value="0.4"></div>
    <div class="group">
      <span class="label">音階 / scale</span>
      <div class="chips" id="scales"></div>
    </div>
    <div class="group">
      <span class="label">材質 / string</span>
      <div class="chips" id="materials"></div>
    </div>
    <div class="group">
      <span class="label">オプション</span>
      <div class="chips">
        <button class="chip" id="midi" aria-pressed="false">MIDI接続</button>
        <button class="chip" id="pan" aria-pressed="true">音の定位</button>
        <button class="chip" id="course" aria-pressed="false">複弦</button>
        <button class="chip" id="ji" aria-pressed="false">純正律</button>
        <button class="chip play" id="auto" aria-pressed="false">自動演奏</button>
      </div>
    </div>
  </div>
</div>

<div class="hint" id="hint"><div class="card">
  <div class="k">◦ ◦ ◦ ◦ ◦ ◦ ◦</div>
  <div class="big">弦にふれる</div>
  <div class="sub">クリック / タップで撥弦、なぞると爪弾き。キー <b style="color:#ffcf6e">A S D F G H J K</b> でも鳴る。</div>
</div></div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('c');
  const ctx2d = cv.getContext('2d');
  let W=0,H=0,DPR=1;

  // ---------- musical scales (semitone offsets) ----------
  const SCALES = {
    "陽 pentatonic":[0,2,4,7,9],
    "陰 都節":[0,1,5,7,8],
    "琉球":[0,4,5,7,11],
    "長 major":[0,2,4,5,7,9,11],
    "短 minor":[0,2,3,5,7,8,10],
  };
  const NAMES=["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
  const ROOT=48;                 // C3
  const N_STRINGS=15;
  let scaleName="陽 pentatonic";

  // 弦の材質 — each profile reshapes the string loop: how long it rings (decayMul),
  // how bright the harmonic decay is (toneAdd → loop damping), how inharmonic/stiff it is
  // (k → an allpass in the loop that stretches partials), and how hard the pluck attacks
  // (soft → excitation lowpass). Colours tint the strings to match.
  const MATERIALS=[
    {name:"桐",    en:"paulownia", decayMul:0.72, toneAdd:-0.18, k:0.0,  soft:0.5,  core:"#ffcf6e", edge:"#8a5a26", glow:"#ffb44a"},
    {name:"ナイロン",en:"nylon",     decayMul:0.9,  toneAdd:-0.08, k:0.015,soft:0.6,  core:"#f2ead0", edge:"#9a8f66", glow:"#f0dfa0"},
    {name:"スチール",en:"steel",     decayMul:1.45, toneAdd:0.15,  k:0.05, soft:0.12, core:"#e2ecf6", edge:"#6b7a8a", glow:"#aecdf0"},
    {name:"ガラス", en:"glass",     decayMul:1.7,  toneAdd:0.28,  k:0.13, soft:0.03, core:"#c2f0ff", edge:"#4f9fb0", glow:"#8fe6ff"},
  ];
  let mat=2;                       // default: スチール
  let MAT=MATERIALS[mat];
  let panWidth=0.85;               // pitch → stereo position (0 = mono, on by default)
  let courseOn=false;              // 複弦: double each note with a detuned partner
  let tuning='et';                 // 'et' equal temperament | 'ji' just intonation
  // 5-limit just ratios relative to the tonic (= ROOT's pitch class)
  const JI=[1, 16/15, 9/8, 6/5, 5/4, 4/3, 45/32, 3/2, 8/5, 5/3, 9/5, 15/8];

  let strings=[];                // {freq,midi,name,x, amp,amp0,t0,tau,wv,phase}

  function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}
  const rootFreq=midiToFreq(ROOT);
  function noteFreq(m){                       // respects current tuning; tonic + octaves stay fixed
    if(tuning==='et') return midiToFreq(m);
    const rel=m-ROOT, oct=Math.floor(rel/12), pc=((rel%12)+12)%12;
    return rootFreq*Math.pow(2,oct)*JI[pc];
  }
  function buildStrings(){
    const sc=SCALES[scaleName]; strings=[];
    for(let i=0;i<N_STRINGS;i++){
      const oct=Math.floor(i/sc.length), deg=i%sc.length;
      const midi=ROOT+oct*12+sc[deg];
      strings.push({freq:noteFreq(midi),midi,
        name:NAMES[midi%12]+(Math.floor(midi/12)-1),
        x:0, amp:0,amp0:0,t0:-9,tau:1,fret:0,wv:2+i*0.35,phase:Math.random()*6.28});
    }
    layout();
  }
  function layout(){
    const marginX=Math.min(W*0.12,120);
    const span=W-marginX*2;
    strings.forEach((s,i)=>{ s.x=marginX+span*(i/(strings.length-1)); });
  }

  // ---------- audio graph (real-time AudioWorklet) ----------
  const P={decay:0.62,tone:0.5,pos:0.22,rev:0.34,body:0.5,size:0.5,symp:0.4};
  let AC=null, busIn=null, wet=null, conv=null, master=null, ks=null;
  let bodyBus=null, directGain=null, bodyFilters=[];
  let sympBus=null, sympFilters=[];
  const sizeMul=s=>Math.pow(2,-(s-0.5)*1.7);   // small box → higher modes, large → lower
  let ready=false, initing=null, engine='none';
  const voices=[];   // main-thread voice pool (used by the ScriptProcessor fallback)

  // Karplus-Strong runs on the audio thread — no per-note buffers, no main-thread jank.
  const WORKLET = `
  class KS extends AudioWorkletProcessor {
    constructor(){ super(); this.voices=[];
      this.port.onmessage = e => { const m=e.data;
        if(m.t==='pluck') this.pluck(m); }; }
    pluck(m){
      const sr=sampleRate;
      const N=Math.max(2,Math.round(sr/m.freq));
      const T60=0.28*Math.pow(48,m.decay)*m.decayMul;
      const loopGain=Math.min(0.99995,Math.pow(10,-3/(m.freq*T60)));
      const S=Math.max(0,Math.min(1,0.5+0.49*(m.tone+m.toneAdd)));
      const noise=new Float32Array(N);
      for(let i=0;i<N;i++) noise[i]=Math.random()*2-1;
      const d=Math.max(1,Math.round(m.pos*N));
      const line=new Float32Array(N); let peak=1e-6;
      for(let i=0;i<N;i++){ line[i]=noise[i]-noise[(i+d)%N]; peak=Math.max(peak,Math.abs(line[i])); }
      if(m.soft>0){ let yp=0;
        for(let i=0;i<N;i++){ yp=m.soft*yp+(1-m.soft)*line[i]; line[i]=yp; }
        peak=1e-6; for(let i=0;i<N;i++) peak=Math.max(peak,Math.abs(line[i])); }
      const sc=0.5*m.vel/peak;
      for(let i=0;i<N;i++) line[i]*=sc;
      this.voices.push({line,N,idx:0,S,g:loopGain,k:m.k,apx:0,apy:0,gL:m.gL,gR:m.gR});
      if(this.voices.length>24) this.voices.shift();
    }
    process(_in,out){
      const L=out[0][0], R=out[0][1]||out[0][0]; L.fill(0); if(R!==L) R.fill(0);
      const V=this.voices;
      for(let v=V.length-1;v>=0;v--){
        const vo=V[v], line=vo.line, N=vo.N, S=vo.S, g=vo.g, k=vo.k, gL=vo.gL, gR=vo.gR;
        let idx=vo.idx, apx=vo.apx, apy=vo.apy, e=0;
        for(let i=0;i<L.length;i++){
          const cur=line[idx];
          const nxt=line[idx+1>=N?0:idx+1];
          const lp=S*cur+(1-S)*0.5*(cur+nxt);
          const ap=k*lp+apx-k*apy;
          apx=lp; apy=ap;
          line[idx]=ap*g;
          L[i]+=cur*gL; R[i]+=cur*gR; e+=cur*cur;
          idx++; if(idx>=N) idx=0;
        }
        vo.idx=idx; vo.apx=apx; vo.apy=apy;
        if(e/L.length < 2e-8) V.splice(v,1);   // reap silent voices
      }
      return true;
    }
  }
  registerProcessor('ks', KS);`;

  function makeIR(dur,dec){
    const n=Math.floor(AC.sampleRate*dur), b=AC.createBuffer(2,n,AC.sampleRate);
    for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dec);}
    return b;
  }
  function ensureAudio(){
    if(ready) return Promise.resolve();
    if(initing) return initing;
    initing = (async ()=>{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      busIn=AC.createGain();
      const mix=AC.createGain();                         // direct + body sum
      directGain=AC.createGain(); directGain.gain.value=0.9-0.4*P.body;
      wet=AC.createGain(); wet.gain.value=P.rev;
      conv=AC.createConvolver(); conv.buffer=makeIR(2.6,2.4);
      const comp=AC.createDynamicsCompressor();
      comp.threshold.value=-12; comp.knee.value=8; comp.ratio.value=3;
      comp.attack.value=0.003; comp.release.value=0.25;
      master=AC.createGain(); master.gain.value=0.85;

      // 胴鳴り — modal body: parallel resonators at the fixed modes of a wooden
      // soundbox (air/Helmholtz → top plate → higher body modes). High-Q bands ring
      // on after the pluck; notes landing on a mode bloom. 胴の大きさ moves every mode.
      bodyBus=AC.createGain(); bodyBus.gain.value=P.body*3.6;
      const MODES=[[110,15,1.0],[210,13,0.95],[400,11,0.8],[640,10,0.62],[1150,9,0.46],[2200,8,0.32]];
      const mul=sizeMul(P.size); bodyFilters=[];
      for(const [f,q,gain] of MODES){
        const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f*mul; bp.Q.value=q;
        const mg=AC.createGain(); mg.gain.value=gain;
        busIn.connect(bp); bp.connect(mg); mg.connect(bodyBus);
        bodyFilters.push({bp,base:f});
      }
      busIn.connect(directGain); directGain.connect(mix);   // direct string
      bodyBus.connect(mix);                                 // body coloration + ring
      mix.connect(comp);                                    // instrument → compressor
      mix.connect(conv); conv.connect(wet); wet.connect(comp);  // room reverb of the whole instrument

      // 共鳴弦 — sympathetic strings: a high-Q resonator tuned to every string's pitch
      // (plus its octave), always listening. A plucked note whose partials coincide with
      // another string's pitch sets that resonator ringing — the piano/koto "halo".
      sympBus=AC.createGain(); sympBus.gain.value=P.symp*6; sympBus.connect(comp);
      sympFilters=[];
      for(let i=0;i<strings.length;i++){
        for(const h of [1,2]){
          const bp=AC.createBiquadFilter(); bp.type='bandpass';
          bp.frequency.value=strings[i].freq*h; bp.Q.value=h===1?30:38;
          const mg=AC.createGain(); mg.gain.value=h===1?1:0.45;
          mix.connect(bp); bp.connect(mg); mg.connect(sympBus);
          sympFilters.push({bp,i,h});
        }
      }
      comp.connect(master); master.connect(AC.destination);

      // Preferred path: real-time synthesis on the audio thread via AudioWorklet.
      try{
        const url=URL.createObjectURL(new Blob([WORKLET],{type:'text/javascript'}));
        await AC.audioWorklet.addModule(url);
        ks=new AudioWorkletNode(AC,'ks',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[2]});
        ks.connect(busIn); engine='worklet';
      }catch(err){
        // Sandboxed iframes (e.g. this preview) block blob worklet modules — fall back
        // to a ScriptProcessorNode running the identical delay-line loop (stereo out).
        let sp;
        try{ sp=AC.createScriptProcessor(2048,0,2); }
        catch(e){ sp=AC.createScriptProcessor(2048,1,2); }
        sp.onaudioprocess=ev=>{ const b=ev.outputBuffer;
          renderVoices(b.getChannelData(0), b.numberOfChannels>1?b.getChannelData(1):b.getChannelData(0)); };
        sp.connect(busIn); engine='sp';
      }
      ready=true;
    })();
    return initing;
  }

  // Build one Karplus-Strong voice (excitation is tiny: tens–hundreds of samples).
  function makeVoice(m){
    const sr=AC.sampleRate;
    const N=Math.max(2,Math.round(sr/m.freq));
    const T60=0.28*Math.pow(48,m.decay)*m.decayMul;
    const g=Math.min(0.99995,Math.pow(10,-3/(m.freq*T60)));
    const S=Math.max(0,Math.min(1,0.5+0.49*(m.tone+m.toneAdd)));
    const noise=new Float32Array(N);
    for(let i=0;i<N;i++) noise[i]=Math.random()*2-1;
    const d=Math.max(1,Math.round(m.pos*N));
    const line=new Float32Array(N); let peak=1e-6;
    for(let i=0;i<N;i++){ line[i]=noise[i]-noise[(i+d)%N]; peak=Math.max(peak,Math.abs(line[i])); }
    if(m.soft>0){ let yp=0;                       // soften the pluck attack (material)
      for(let i=0;i<N;i++){ yp=m.soft*yp+(1-m.soft)*line[i]; line[i]=yp; }
      peak=1e-6; for(let i=0;i<N;i++) peak=Math.max(peak,Math.abs(line[i])); }
    const sc=0.5*m.vel/peak;
    for(let i=0;i<N;i++) line[i]*=sc;
    return {line,N,idx:0,S,g,k:m.k,apx:0,apy:0,gL:m.gL,gR:m.gR};
  }
  function renderVoices(L,R){
    L.fill(0); if(R!==L) R.fill(0);
    for(let v=voices.length-1;v>=0;v--){
      const vo=voices[v], line=vo.line, N=vo.N, S=vo.S, g=vo.g, k=vo.k, gL=vo.gL, gR=vo.gR;
      let idx=vo.idx, apx=vo.apx, apy=vo.apy, e=0;
      for(let i=0;i<L.length;i++){
        const cur=line[idx];
        const nxt=line[idx+1>=N?0:idx+1];
        const lp=S*cur+(1-S)*0.5*(cur+nxt);       // damping lowpass
        const ap=k*lp+apx-k*apy;                   // allpass → inharmonicity (stiffness)
        apx=lp; apy=ap;
        line[idx]=ap*g;
        L[i]+=cur*gL; R[i]+=cur*gR; e+=cur*cur;
        idx++; if(idx>=N) idx=0;
      }
      vo.idx=idx; vo.apx=apx; vo.apy=apy;
      if(e/L.length < 2e-8) voices.splice(v,1);
    }
  }
  function sendPluck(m){
    if(engine==='worklet'){ ks.port.postMessage({t:'pluck',...m}); }
    else { voices.push(makeVoice(m)); if(voices.length>24) voices.shift(); }
  }
  // Sympathetic coupling strength: how strongly a note at f0 excites a string at f,
  // via coincident partials (n·f0 ≈ d·f). Higher-order coincidences couple weaker.
  function coupling(f0,f){
    let best=0;
    for(let n=1;n<=6;n++) for(let d=1;d<=6;d++){
      const cents=Math.abs(1200*Math.log2((n*f0)/(d*f)));
      if(cents<35){ const s=(1-cents/35)/(n*d); if(s>best) best=s; }
    }
    return best;
  }
  function retuneSymp(){
    if(!sympFilters.length||!AC) return;
    for(const sf of sympFilters){ const s=strings[sf.i]; if(!s) continue;
      sf.bp.frequency.setTargetAtTime(s.freq*sf.h, AC.currentTime, 0.03); }
  }

  // ---------- pluck ----------
  // Open string: pluck(i) plays strings[i] at its own pitch. playString can also sound
  // a *higher* target pitch on a lower string — like fretting: the finger shortens the
  // vibrating length, so only the part below the fret rings.
  function pluck(i,vel=1,sympathetic=false){
    const s=strings[i]; if(!s) return;
    playString(i, s.freq, s.midi, vel, sympathetic);
  }
  function playString(i, freq, midi, vel=1, sympathetic=false){
    const s=strings[i]; if(!s) return;
    const T60=0.28*Math.pow(48,P.decay)*MAT.decayMul;
    const base=Math.min(46,W*0.06);
    const fretFrac=Math.max(0,1 - s.freq/freq);   // 0 = open; →1 as the note climbs the string
    s.amp0=Math.min(1,vel)*base;
    s.amp=s.amp0; s.t0=performance.now()/1000; s.phase=Math.random()*6.28;
    s.tau=Math.max(0.25,T60*0.55); s.fret=fretFrac;
    if(sympathetic){ s.fret=0; return; }  // sympathetic strings only shimmer, don't re-drive
    ripples.push({x:s.x,y:top()+ (bot()-top())*(fretFrac+ (1-fretFrac)*0.5),r:6,a:0.7,vel});

    // visual halo: neighbouring strings that share partials quiver in sympathy
    if(P.symp>0.02){
      for(let j=0;j<strings.length;j++){ if(j===i) continue;
        const c=coupling(freq,strings[j].freq)*P.symp;
        if(c>0.04){ const o=strings[j];
          const add=Math.min(0.55,c*1.6)*base*vel;
          if(add>o.amp){ o.amp0=add; o.amp=add; o.t0=performance.now()/1000+0.02;
            o.phase=Math.random()*6.28; o.tau=Math.max(0.5,T60*0.7); o.fret=0; }
        }
      }
    }
    ensureAudio().then(()=>{
      if(AC.state==='suspended') AC.resume();
      const p = panWidth*Math.max(-1,Math.min(1, ((midi-midiLo())/(midiHi()-midiLo()||1))*2-1 ));
      const velTone=(vel-0.6)*0.3;               // harder pluck → a little brighter
      const emit=(f,v,pan)=>{ const a=(Math.max(-1,Math.min(1,pan))+1)*Math.PI/4;
        sendPluck({freq:f,decay:P.decay,tone:P.tone,pos:P.pos,vel:v,
          decayMul:MAT.decayMul,toneAdd:MAT.toneAdd+velTone,k:MAT.k,soft:MAT.soft,
          gL:Math.cos(a), gR:Math.sin(a)}); };
      emit(freq, vel, p);                        // main string
      if(courseOn){                              // 複弦: a slightly detuned partner, spread aside
        emit(freq*Math.pow(2,7/1200), vel*0.78, p+0.22);
      }
    });
  }
  const midiLo=()=>strings[0].midi, midiHi=()=>strings[strings.length-1].midi;
  const top=()=>H*0.10, bot=()=>H*0.90;

  // ---------- rendering ----------
  const ripples=[];
  function frame(){
    const now=performance.now()/1000;
    // backdrop
    const g=ctx2d.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#181209'); g.addColorStop(.5,'#14100c'); g.addColorStop(1,'#0e0b07');
    ctx2d.fillStyle=g; ctx2d.fillRect(0,0,W,H);

    const top=H*0.10, bot=H*0.90, L=bot-top;

    // pluck blooms
    ctx2d.globalCompositeOperation='lighter';
    for(let k=ripples.length-1;k>=0;k--){
      const r=ripples[k]; r.r+=6; r.a*=0.90;
      if(r.a<0.02){ripples.splice(k,1);continue;}
      const rg=ctx2d.createRadialGradient(r.x,r.y,0,r.x,r.y,r.r);
      rg.addColorStop(0,`rgba(255,150,70,${r.a*0.5})`);
      rg.addColorStop(1,'rgba(255,150,70,0)');
      ctx2d.fillStyle=rg; ctx2d.beginPath(); ctx2d.arc(r.x,r.y,r.r,0,6.2832); ctx2d.fill();
    }
    ctx2d.globalCompositeOperation='source-over';

    // strings
    for(const s of strings){
      const age=now-s.t0;
      s.amp=s.amp0*Math.exp(-age/s.tau);
      const active=s.amp>0.4;
      const disp=active? s.amp*Math.sin(2*Math.PI*s.wv*age+s.phase) : 0;
      const fr=active? s.fret : 0;                 // fretted fraction (0 = open, whole string)

      // glow layer when ringing
      if(active){
        ctx2d.globalCompositeOperation='lighter';
        ctx2d.strokeStyle=MAT.glow||`rgba(255,180,90,${Math.min(0.5,s.amp/40)})`;
        ctx2d.globalAlpha=Math.min(0.5,s.amp/40);
        ctx2d.lineWidth=6; ctx2d.beginPath();
        drawString(s.x,top,bot,disp,fr);
        ctx2d.stroke(); ctx2d.globalAlpha=1;
        ctx2d.globalCompositeOperation='source-over';
      }
      // the string itself
      const grad=ctx2d.createLinearGradient(s.x-6,0,s.x+6,0);
      grad.addColorStop(0,MAT.edge); grad.addColorStop(.5,MAT.core); grad.addColorStop(1,MAT.edge);
      ctx2d.strokeStyle=active?MAT.core:grad;
      ctx2d.lineWidth=active?1.8:1.1;
      ctx2d.beginPath(); drawString(s.x,top,bot,disp,fr); ctx2d.stroke();

      // finger stopping the string (fretted note)
      if(fr>0.001){ const fy=top+(bot-top)*fr;
        ctx2d.fillStyle=MAT.core;
        ctx2d.beginPath(); ctx2d.arc(s.x,fy,4.5,0,6.2832); ctx2d.fill();
        ctx2d.globalAlpha=0.35; ctx2d.beginPath(); ctx2d.arc(s.x,fy,8,0,6.2832); ctx2d.fill(); ctx2d.globalAlpha=1;
      }

      // anchors
      ctx2d.fillStyle='#5a4a30';
      ctx2d.fillRect(s.x-4,top-3,8,3); ctx2d.fillRect(s.x-4,bot,8,3);

      // note label
      ctx2d.fillStyle=active?'#ffcf6e':'#6f6552';
      ctx2d.font='10px ui-monospace,Menlo,monospace';
      ctx2d.textAlign='center';
      ctx2d.fillText(s.name,s.x,bot+18);
    }
    requestAnimationFrame(frame);
  }
  function drawString(x,top,bot,disp,fret=0){
    ctx2d.moveTo(x,top);
    const seg=20, span=Math.max(0.001,1-fret);
    for(let i=1;i<=seg;i++){
      const t=i/seg, y=top+(bot-top)*t;
      const shape = t<fret ? 0 : Math.sin(Math.PI*(t-fret)/span);  // only below the fret vibrates
      ctx2d.lineTo(x+disp*shape,y);
    }
  }

  // ---------- pointer interaction ----------
  function nearest(px){
    let best=0,bd=1e9;
    strings.forEach((s,i)=>{const dd=Math.abs(s.x-px); if(dd<bd){bd=dd;best=i;}});
    return {i:best,d:bd};
  }
  let down=false,lastIdx=-1,lastX=0,lastT=0;
  function pos(e){const r=cv.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top};}
  function onDown(e){e.preventDefault();down=true;dismiss();
    const p=pos(e);lastX=p.x;lastT=performance.now();
    const n=nearest(p.x); if(n.d<34){pluck(n.i,1);lastIdx=n.i;}}
  function onMove(e){ if(!down) return; e.preventDefault();
    const p=pos(e), t=performance.now();
    const n=nearest(p.x);
    if(n.d<34 && n.i!==lastIdx){
      const dt=Math.max(8,t-lastT), spd=Math.abs(p.x-lastX)/dt;
      pluck(n.i,Math.min(1,0.45+spd*0.5)); lastIdx=n.i;
    }
    lastX=p.x;lastT=t;}
  function onUp(){down=false;lastIdx=-1;}
  cv.addEventListener('mousedown',onDown); addEventListener('mousemove',onMove); addEventListener('mouseup',onUp);
  cv.addEventListener('touchstart',onDown,{passive:false});
  cv.addEventListener('touchmove',onMove,{passive:false});
  addEventListener('touchend',onUp);

  // keyboard
  const KEYS="asdfghjkl;'";
  addEventListener('keydown',e=>{
    if(e.repeat)return; const k=KEYS.indexOf(e.key.toLowerCase());
    if(k>=0&&k<strings.length){pluck(k,0.95);dismiss();}
  });

  // ---------- controls ----------
  const $=id=>document.getElementById(id);
  function fmtPct(v){return Math.round(v*100)+'%';}
  function refresh(){
    $('vDecay').textContent=fmtPct(P.decay);
    $('vTone').textContent=P.tone<0.5?'明るい':P.tone>0.5?'暗い':'標準';
    $('vPos').textContent=fmtPct(P.pos*2);
    $('vRev').textContent=fmtPct(P.rev);
    $('vBody').textContent=fmtPct(P.body);
    $('vSize').textContent=P.size<0.34?'小':P.size>0.66?'大':'中';
    $('vSymp').textContent=fmtPct(P.symp);
  }
  $('decay').oninput=e=>{P.decay=+e.target.value;refresh();};
  $('tone').oninput=e=>{P.tone=+e.target.value;refresh();};
  $('pos').oninput=e=>{P.pos=+e.target.value;refresh();};
  $('rev').oninput=e=>{P.rev=+e.target.value; if(wet)wet.gain.value=P.rev; refresh();};
  $('body').oninput=e=>{P.body=+e.target.value;
    if(bodyBus)bodyBus.gain.value=P.body*3.6;
    if(directGain)directGain.gain.value=0.9-0.4*P.body; refresh();};
  $('size').oninput=e=>{P.size=+e.target.value;
    const m=sizeMul(P.size);
    for(const bf of bodyFilters) bf.bp.frequency.value=bf.base*m; refresh();};
  $('symp').oninput=e=>{P.symp=+e.target.value;
    if(sympBus)sympBus.gain.value=P.symp*6; refresh();};
  $('pan').onclick=e=>{ const on=e.target.getAttribute('aria-pressed')!=='true';
    e.target.setAttribute('aria-pressed',on); panWidth=on?0.85:0; };
  $('course').onclick=e=>{ const on=e.target.getAttribute('aria-pressed')!=='true';
    e.target.setAttribute('aria-pressed',on); courseOn=on; };
  $('ji').onclick=e=>{ const on=e.target.getAttribute('aria-pressed')!=='true';
    e.target.setAttribute('aria-pressed',on); tuning=on?'ji':'et';
    buildStrings(); retuneSymp(); };

  // ---------- MIDI input (Web MIDI) ----------
  function frettedBase(note){        // highest string at or below the note (fret up from it)
    let b=0; for(let i=0;i<strings.length;i++){ if(strings[i].midi<=note) b=i; } return b; }
  function onMidi(e){ const d=e.data; if(!d||d.length<2) return;
    const cmd=d[0]&0xf0, note=d[1], v=d[2]||0;
    if(cmd===0x90 && v>0){
      const i=frettedBase(note);
      const freq=noteFreq(note);                 // exact target pitch (tuning-aware, chromatic via fretting)
      playString(i, freq, note, Math.max(0.05,v/127));
    }
    // note-off ignored — a plucked string rings out on its own
  }
  function midiBtn(count){ const b=$('midi');
    b.setAttribute('aria-pressed',count>0);
    b.textContent = count>0 ? ('MIDI ●'+(count>1?' ×'+count:'')) : 'MIDI 未検出'; }
  function bindInputs(access){ let n=0; access.inputs.forEach(inp=>{inp.onmidimessage=onMidi;n++;}); return n; }
  $('midi').onclick=()=>{
    if(!navigator.requestMIDIAccess){ $('midi').textContent='MIDI非対応'; return; }
    ensureAudio();
    navigator.requestMIDIAccess().then(access=>{
      midiBtn(bindInputs(access));
      access.onstatechange=()=>midiBtn(bindInputs(access));   // catch hot-plugged devices
    }, ()=>{ $('midi').textContent='MIDI拒否'; });
  };

  // scale chips
  const sc=$('scales');
  Object.keys(SCALES).forEach(name=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=name.split(' ')[0];
    b.setAttribute('aria-pressed',name===scaleName);
    b.onclick=()=>{scaleName=name;buildStrings();retuneSymp();
      [...sc.children].forEach((c,i)=>c.setAttribute('aria-pressed',Object.keys(SCALES)[i]===name));};
    sc.appendChild(b);
  });

  // material chips
  const mc=$('materials');
  MATERIALS.forEach((M,idx)=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=M.name;
    b.setAttribute('aria-pressed',idx===mat);
    b.onclick=()=>{mat=idx; MAT=MATERIALS[idx];
      [...mc.children].forEach((c,i)=>c.setAttribute('aria-pressed',i===idx));};
    mc.appendChild(b);
  });

  // autoplay arpeggiator
  let autoTimer=null, step=0;
  const patterns=[[0,2,4,6,4,2],[0,3,5,7,9,7,5,3],[7,5,3,1,3,5],[0,4,2,6,4,8,6,10]];
  let pat=patterns[0];
  $('auto').onclick=e=>{
    const on=e.target.getAttribute('aria-pressed')==='true';
    if(on){clearInterval(autoTimer);autoTimer=null;e.target.setAttribute('aria-pressed','false');}
    else{
      ensureAudio(); dismiss();
      pat=patterns[Math.floor(Math.random()*patterns.length)]; step=0;
      e.target.setAttribute('aria-pressed','true');
      autoTimer=setInterval(()=>{
        const idx=pat[step%pat.length]%strings.length;
        pluck(idx,0.55+Math.random()*0.35);
        if(Math.random()<0.22) pluck((idx+2)%strings.length,0.4); // occasional harmony
        step++;
        if(step%(pat.length*2)===0) pat=patterns[Math.floor(Math.random()*patterns.length)];
      },260);
    }
  };

  function dismiss(){const h=$('hint'); if(h&&!h.classList.contains('gone'))h.classList.add('gone');}
  $('hint').onclick=dismiss;

  // ---------- resize / boot ----------
  function resize(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=innerWidth; H=innerHeight;
    cv.width=W*DPR; cv.height=H*DPR;
    ctx2d.setTransform(DPR,0,0,DPR,0,0);
    layout();
  }
  addEventListener('resize',resize);
  resize(); buildStrings(); refresh(); requestAnimationFrame(frame);
})();
</script>
